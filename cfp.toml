# ─── Bayou Family Fishing & Charity — CFP Configuration ────────────────────────

[build]
  publish = "public"

# ─── Security Headers (applied to every page) ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]

    # Prevents the site from being embedded in iframes on other domains (clickjacking)
    X-Frame-Options = "DENY"

    # Stops browsers from MIME-sniffing a response from the declared content type
    X-Content-Type-Options = "nosniff"

    # Only sends the origin (not full URL) as the Referer header to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disables access to sensitive browser features not used by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"

    # Legacy XSS filter (belt-and-suspenders for older browsers)
    X-XSS-Protection = "1; mode=block"

    # Content Security Policy
    # Notes:
    #   - 'unsafe-inline' is required because the site uses inline <script> and <style> blocks
    #   - unpkg.com serves Leaflet (with SRI verification in the HTML)
    #   - fonts.googleapis.com / fonts.gstatic.com serve Google Fonts
    #   - *.tile.openstreetmap.org serves the Leaflet map tiles
    #   - formspree.io is the form submission backend
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com https://*.supabase.co; connect-src 'self' https://formspree.io https://*.supabase.co; form-action 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

# ─── Cache Headers ─────────────────────────────────────────────────────────────

# Photos and videos: cache for 1 year (content-addressed by filename — bump name to bust)
[[headers]]
  for = "/Photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate (ensures visitors always get the latest version)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# cfp.toml itself: no cache
[[headers]]
  for = "/cfp.toml"
  [headers.values]
    Cache-Control = "no-store"

# ─── 404 Handler ───────────────────────────────────────────────────────────────
# CFP auto-detects 404.html at the root, but this makes it explicit.
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
